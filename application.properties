# Runtime knobs for the chess referee. This file is re-read before every bot
# move, so edits apply immediately — no restart needed.
# (Run the app from this directory, or point at the file with -Dchess.config=...)

# The bot waits a random "thinking" delay in [min, max] milliseconds before playing.
bot.move.delay.min.ms=400
bot.move.delay.max.ms=800
